<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MDC Racing Overlay</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: "Segoe UI", "Arial", sans-serif;
    color: #ffffff;
    -webkit-font-smoothing: antialiased;
  }
  .overlay {
    padding: 14px 22px;
    background: linear-gradient(135deg, rgba(0, 32, 96, 0.85), rgba(0, 82, 204, 0.85));
    border: 2px solid #ffd700;
    border-radius: 12px;
    display: inline-block;
    margin: 12px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.35);
  }
  .title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.5px;
    line-height: 1.2;
  }
  .sub {
    font-size: 14px;
    opacity: 0.9;
    margin-top: 4px;
  }
  .accent { color: #ffd700; }
</style>
</head>
<body>
  <div class="overlay">
    <div class="title">Miami Dade College <span class="accent">—</span> MDC Racing</div>
    <div class="sub">IBM AI Racing League &nbsp;•&nbsp; Corkscrew &nbsp;•&nbsp; Standing Start</div>
  </div>
</body>
</html>
